<div class="skeleton-wrapper">
  @switch (type()) {
    @case ('card') {
      <div class="skeleton-grid">
        @for (_ of [].constructor(count()); track $index) {
          <div class="skeleton-card">
            <div class="sk-block sk-image"></div>
            <div class="skeleton-body">
              <span class="sk-block sk-line sk-line--short"></span>
              <span class="sk-block sk-line sk-line--long"></span>
              <span class="sk-block sk-line sk-line--xshort"></span>
            </div>
          </div>
        }
      </div>
    }
    @case ('list') {
      <div class="skeleton-list">
        @for (_ of [].constructor(count()); track $index) {
          <div class="skeleton-list-item">
            <div class="sk-block sk-thumb"></div>
            <div class="sk-list-body">
              <span class="sk-block sk-line sk-line--short"></span>
              <span class="sk-block sk-line sk-line--med"></span>
              <span class="sk-block sk-line sk-line--xshort"></span>
            </div>
          </div>
        }
      </div>
    }
    @case ('table') {
      <div class="skeleton-table-wrap">
        <table class="skeleton-table">
          <thead>
            <tr>
              <th><span class="sk-block sk-line sk-line--short"></span></th>
              <th><span class="sk-block sk-line sk-line--med"></span></th>
              <th><span class="sk-block sk-line sk-line--short"></span></th>
              <th><span class="sk-block sk-line sk-line--xshort"></span></th>
            </tr>
          </thead>
          <tbody>
            @for (_ of [].constructor(count()); track $index) {
              <tr>
                <td><span class="sk-block sk-line sk-line--med"></span></td>
                <td><span class="sk-block sk-line sk-line--long"></span></td>
                <td><span class="sk-block sk-line sk-line--short"></span></td>
                <td><span class="sk-block sk-line sk-line--xshort"></span></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
    @case ('detail') {
      <div class="skeleton-detail">
        <div class="sk-block sk-detail-img"></div>
        <div class="sk-detail-info">
          <span class="sk-block sk-line sk-line--short"></span>
          <span class="sk-block sk-line sk-line--med" style="height: 2rem;"></span>
          <span class="sk-block sk-line sk-line--xshort" style="height: 1.5rem;"></span>
          <span class="sk-block sk-line sk-line--full" style="height: 4rem;"></span>
          <div class="sk-detail-actions">
            <span class="sk-block sk-line sk-line--short" style="height: 2.5rem;"></span>
            <span class="sk-block sk-line sk-line--xshort" style="height: 2.5rem;"></span>
          </div>
        </div>
      </div>
    }
  }
</div>
