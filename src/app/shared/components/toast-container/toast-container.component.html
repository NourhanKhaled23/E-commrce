<div class="toast-container toast-container-custom">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div class="toast show align-items-center border-0 mb-2 shadow"
         [class.text-bg-success]="toast.type === 'success'"
         [class.text-bg-danger]="toast.type === 'error'"
         [class.text-bg-info]="toast.type === 'info'"
         [class.text-bg-warning]="toast.type === 'warning'"
         role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center">
          <i class="bi me-2 fs-5"
             [class.bi-check-circle-fill]="toast.type === 'success'"
             [class.bi-exclamation-circle-fill]="toast.type === 'error'"
             [class.bi-info-circle-fill]="toast.type === 'info'"
             [class.bi-exclamation-triangle-fill]="toast.type === 'warning'"></i>
          <span>{{ toast.message }}</span>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="dismiss(toast.id)" aria-label="Close"></button>
      </div>
    </div>
  }
</div>
