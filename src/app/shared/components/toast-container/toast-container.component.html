<div class="toast-container-custom" role="status" aria-live="polite" aria-atomic="false">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div class="of-toast"
         [class.toast--success]="toast.type === 'success'"
         [class.toast--error]="toast.type === 'error'"
         [class.toast--info]="toast.type === 'info'"
         [class.toast--warning]="toast.type === 'warning'"
         role="alert" aria-live="assertive" aria-atomic="true">
      <div class="of-toast__body">
        <i class="bi of-toast__icon"
           [class.bi-check-circle-fill]="toast.type === 'success'"
           [class.bi-exclamation-circle-fill]="toast.type === 'error'"
           [class.bi-info-circle-fill]="toast.type === 'info'"
           [class.bi-exclamation-triangle-fill]="toast.type === 'warning'"
           aria-hidden="true"></i>
        <span>{{ toast.message }}</span>
      </div>
      <button type="button" class="of-toast__close" (click)="dismiss(toast.id)" aria-label="Dismiss notification">
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>
  }
</div>
