<div class="toast-container-of">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-item-of" [class.toast-success]="toast.type === 'success'"
          [class.toast-error]="toast.type === 'error'"
          [class.toast-info]="toast.type === 'info'"
          [class.toast-warning]="toast.type === 'warning'">
      <i class="bi" [class.bi-check-circle-fill]="toast.type === 'success'"
           [class.bi-exclamation-circle-fill]="toast.type === 'error'"
           [class.bi-info-circle-fill]="toast.type === 'info'"
           [class.bi-exclamation-triangle-fill]="toast.type === 'warning'"></i>
      <span class="toast-message-of">{{ toast.message }}</span>
      <button class="toast-close-of" (click)="toastService.dismiss(toast.id)"><i class="bi bi-x"></i></button>
    </div>
  }
</div>
