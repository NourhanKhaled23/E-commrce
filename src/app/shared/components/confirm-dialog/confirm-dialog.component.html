@if (dialogService.activeRequest(); as req) {
  <div class="modal-backdrop fade show" (click)="close(false)"></div>
  <div class="modal fade show d-block" tabindex="-1" role="dialog" aria-modal="true" (click)="close(false)">
    <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ req.title }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="close(false)"></button>
        </div>
        <div class="modal-body">
          <p class="mb-0">{{ req.message }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="close(false)">
            {{ req.cancelLabel || ('CONFIRM_DIALOG.NO' | translate) }}
          </button>
          <button type="button" class="btn" [class.btn-primary]="!req.danger" [class.btn-danger]="req.danger" (click)="close(true)">
            {{ req.confirmLabel || ('CONFIRM_DIALOG.YES' | translate) }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
