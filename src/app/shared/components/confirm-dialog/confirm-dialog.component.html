@if (dialogService.activeRequest(); as req) {
  <div class="cd-backdrop" (click)="close(false)"></div>
  <div class="cd-overlay" role="dialog" aria-modal="true" [attr.aria-labelledby]="'cd-title'" tabindex="-1" (click)="close(false)">
    <div class="cd-dialog" role="document" (click)="$event.stopPropagation()">
      <div class="cd-header">
        <h5 class="cd-title" id="cd-title">{{ req.title }}</h5>
        <button type="button" class="cd-close" aria-label="Close" (click)="close(false)">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      </div>
      <div class="cd-body">
        <p>{{ req.message }}</p>
      </div>
      <div class="cd-footer">
        <button type="button" class="cd-btn cd-btn--secondary" (click)="close(false)">
          {{ req.cancelLabel || ('CONFIRM_DIALOG.NO' | translate) }}
        </button>
        <button type="button" class="cd-btn" [class.cd-btn--primary]="!req.danger" [class.cd-btn--danger]="req.danger" (click)="close(true)" cdkFocusInitial>
          {{ req.confirmLabel || ('CONFIRM_DIALOG.YES' | translate) }}
        </button>
      </div>
    </div>
  </div>
}
