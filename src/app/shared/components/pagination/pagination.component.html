@let tp = productService.totalPages();
@if (tp > 1) {
  <nav class="pagination-of">
    <button class="page-btn" [disabled]="productService.currentPage() === 1" (click)="productService.setPage(productService.currentPage() - 1)">
      <i class="bi bi-chevron-left"></i>
    </button>
    @for (p of pages(); track p) {
      @if (p === '...') {
        <span class="page-ellipsis">…</span>
      } @else {
        <button class="page-btn" [class.active]="p === productService.currentPage()" (click)="productService.setPage(+p)">
          {{ p }}
        </button>
      }
    }
    <button class="page-btn" [disabled]="productService.currentPage() === tp" (click)="productService.setPage(productService.currentPage() + 1)">
      <i class="bi bi-chevron-right"></i>
    </button>
  </nav>
}
